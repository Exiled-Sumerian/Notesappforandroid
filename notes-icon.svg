<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#1a73e8"/>
  
  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" rx="110" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <!-- Notepad body -->
  <rect x="110" y="130" width="292" height="310" rx="28" fill="white" opacity="0.97"/>

  <!-- Top spiral binding bar -->
  <rect x="110" y="118" width="292" height="44" rx="22" fill="white" opacity="0.97"/>

  <!-- Spiral holes -->
  <circle cx="186" cy="140" r="13" fill="#1a73e8"/>
  <circle cx="256" cy="140" r="13" fill="#1a73e8"/>
  <circle cx="326" cy="140" r="13" fill="#1a73e8"/>

  <!-- Lines on notepad -->
  <rect x="148" y="205" width="216" height="12" rx="6" fill="#e0e0e0"/>
  <rect x="148" y="240" width="180" height="12" rx="6" fill="#e0e0e0"/>
  <rect x="148" y="275" width="200" height="12" rx="6" fill="#e0e0e0"/>
  <rect x="148" y="310" width="160" height="12" rx="6" fill="#e0e0e0"/>

  <!-- Pencil -->
  <g transform="rotate(-35, 340, 360)">
    <rect x="318" y="290" width="28" height="100" rx="4" fill="#fbbc04"/>
    <rect x="318" y="370" width="28" height="24" rx="2" fill="#f5c842"/>
    <polygon points="318,390 346,390 332,418" fill="#ffccbc"/>
    <polygon points="325,408 339,408 332,422" fill="#333"/>
    <!-- eraser -->
    <rect x="318" y="282" width="28" height="16" rx="4" fill="#ef9a9a"/>
    <rect x="318" y="290" width="28" height="5" fill="#e57373"/>
  </g>
</svg>
