<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#00BCD4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Notes">
<title>My Notes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f0f0eb;
    --border: #e0e0d8;
    --accent: #1a73e8;
    --accent-soft: #e8f0fe;
    --text: #1a1a1a;
    --text2: #5f6368;
    --text3: #9aa0a6;
    --danger: #ea4335;
    --yellow: #fbbc04;
    --green: #34a853;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --teal: #00BCD4;
    --teal-dark: #00838F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* Turquoise bottom bar */
  #mainScreen {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .bottom-bar {
    background: var(--teal);
    height: max(env(safe-area-inset-bottom, 0px), 52px);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    background: var(--teal);
    border-bottom: none;
    padding-top: max(env(safe-area-inset-top, 0px), 32px);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
    flex-shrink: 0;
    z-index: 10;
  }

  .topbar-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    flex: 1;
    color: white;
  }

  .topbar-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: white;
    font-size: 20px;
    transition: background 0.15s;
  }
  .topbar-btn:active { background: rgba(255,255,255,0.2); }

  .search-bar {
    flex: 1;
    background: rgba(255,255,255,0.25);
    border: none;
    border-radius: 24px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
  }
  .search-bar::placeholder { color: rgba(255,255,255,0.7); }
  .search-bar { color: white; }

  /* ===== FOLDER CHIPS ===== */
  .folder-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    border-top: none;
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .folder-bar::-webkit-scrollbar { display: none; }

  .folder-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .folder-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .folder-chip .count {
    background: rgba(0,0,0,0.12);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 11px;
  }
  .folder-chip.active .count { background: rgba(255,255,255,0.25); }
  .folder-chip-add {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1.5px dashed var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text3);
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .folder-chip-add:active { background: var(--surface2); }

  /* ===== NOTES LIST ===== */
  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .note-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .note-card:active { transform: scale(0.985); box-shadow: none; }

  .note-card-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
  }

  .note-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.1px;
    padding-left: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .note-preview {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    padding-left: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .note-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-left: 8px;
  }
  .note-date { font-size: 11px; color: var(--text3); font-weight: 500; }
  .note-type-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .badge-text { background: #e8f0fe; color: #1a73e8; }
  .badge-draw { background: #fce8e6; color: #ea4335; }
  .badge-check { background: #e6f4ea; color: #34a853; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
    padding: 40px;
    text-align: center;
  }
  .empty-icon { font-size: 56px; opacity: 0.4; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text2); }
  .empty-sub { font-size: 14px; line-height: 1.5; }

  /* ===== FAB ===== */
  .fab-container {
    position: fixed;
    bottom: 60px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
    z-index: 20;
  }

  .fab-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
    transition: all 0.25s;
    opacity: 0;
    transform: translateY(10px) scale(0.95);
    pointer-events: none;
  }
  .fab-menu.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .fab-mini {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .fab-mini-label {
    background: var(--text);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }
  .fab-mini-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: transform 0.1s;
  }
  .fab-mini-btn:active { transform: scale(0.92); }
  .fab-text-btn { background: #e8f0fe; color: #1a73e8; }
  .fab-draw-btn { background: #fce8e6; color: #ea4335; }
  .fab-check-btn { background: #e6f4ea; color: #34a853; }

  .fab {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: transform 0.2s, background 0.2s;
  }
  .fab:active { transform: scale(0.92); }
  .fab.open { transform: rotate(45deg); background: var(--danger); }

  /* ===== EDITOR SCREEN ===== */
  .screen {
    position: fixed;
    inset: 0;
    background: var(--surface);
    z-index: 30;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .screen.visible { transform: translateX(0); }

  .editor-topbar {
    background: var(--teal);
    border-bottom: none;
    padding: 0 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 56px;
    flex-shrink: 0;
  }

  .editor-title-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: white;
    background: transparent;
    padding: 0 8px;
    letter-spacing: -0.2px;
  }
  .editor-title-input::placeholder { color: rgba(255,255,255,0.6); }

  .editor-toolbar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .editor-toolbar::-webkit-scrollbar { display: none; }

  .tb-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text2);
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    transition: background 0.1s;
    flex-shrink: 0;
  }
  .tb-btn:active, .tb-btn.active { background: var(--accent-soft); color: var(--accent); }
  .tb-sep { width: 1px; background: var(--border); margin: 4px 4px; flex-shrink: 0; }

  .editor-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .text-editor {
    flex: 1;
    padding: 16px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    background: var(--surface);
    overflow-y: auto;
  }

  /* ===== CHECKLIST EDITOR ===== */
  .checklist-editor {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--surface);
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 12px;
    border: 1px solid var(--border);
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-cb {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    appearance: none;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s;
    background: white;
  }
  .check-cb:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .check-cb:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    font-weight: 700;
  }

  .check-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
  }
  .check-input.done { text-decoration: line-through; color: var(--text3); }
  .check-del {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .check-del:active { background: var(--surface2); color: var(--danger); }

  .add-item-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 12px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.1s;
  }
  .add-item-btn:active { background: var(--accent-soft); }

  /* ===== DRAWING EDITOR ===== */
  .draw-editor {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .draw-toolbar {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .draw-toolbar::-webkit-scrollbar { display: none; }

  .color-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .color-dot.selected { border-color: var(--text); transform: scale(1.15); }

  .draw-tool-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.1s;
  }
  .draw-tool-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .size-slider {
    width: 80px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  canvas#drawCanvas {
    flex: 1;
    touch-action: none;
    cursor: crosshair;
    display: block;
    background: white;
  }

  /* ===== FOLDER PICKER ===== */
  .folder-picker {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .folder-picker-label { font-size: 12px; color: var(--text3); font-weight: 500; }
  .folder-select {
    flex: 1;
    border: none;
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 20px;
    width: 100%;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    max-height: 70vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  .modal-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; }

  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 14px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--surface2); color: var(--text2); }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    z-index: 40;
    overflow: hidden;
    min-width: 160px;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.9);
    transition: all 0.15s;
    transform-origin: top right;
  }
  .ctx-menu.open { opacity: 1; pointer-events: all; transform: scale(1); }

  .ctx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }
  .ctx-item:active { background: var(--surface2); }
  .ctx-item.danger { color: var(--danger); }
  .ctx-item + .ctx-item { border-top: 1px solid var(--border); }

  /* Snackbar */
  .snackbar {
    position: fixed;
    bottom: 100px;
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.2s;
    z-index: 60;
    white-space: nowrap;
  }
  .snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div id="mainScreen">
  <div style="background:#00BCD4;padding:28px 16px 0 16px;font-size:12px;color:#00BCD4;user-select:none;">phillip is cool</div>
  <div class="topbar">
    <div class="topbar-title" id="topTitle">My Notes</div>
    <button class="topbar-btn" id="searchToggle">🔍</button>
    <button class="topbar-btn" id="folderMgrBtn" title="Manage folders">📁</button>
  </div>
  <div class="topbar" id="searchBar" style="display:none; gap:8px;">
    <button class="topbar-btn" id="searchClose">←</button>
    <input class="search-bar" type="text" placeholder="Search notes…" id="searchInput">
  </div>
  <div class="folder-bar" id="folderBar"></div>
  <div class="notes-list" id="notesList"></div>
  <div class="bottom-bar"></div>
</div>

<!-- EDITOR SCREEN -->
<div class="screen" id="editorScreen">
  <div style="background:#00BCD4;padding:28px 16px 0 16px;font-size:12px;color:#00BCD4;user-select:none;">phillip is cool</div>
  <div class="editor-topbar">
    <button class="topbar-btn" id="editorBack">←</button>
    <input class="editor-title-input" id="editorTitle" placeholder="Title">
    <button class="topbar-btn" id="editorSave" style="color:white;font-size:14px;font-weight:600;width:auto;padding:0 8px;border-radius:8px;">Save</button>
    <button class="topbar-btn" id="editorMore">⋮</button>
  </div>
  <div class="folder-picker">
    <span class="folder-picker-label">Folder:</span>
    <select class="folder-select" id="editorFolder"></select>
  </div>
  <div class="editor-body" id="editorBody"></div>
</div>

<!-- FAB -->
<div class="fab-container" id="fabContainer">
  <div class="fab-menu" id="fabMenu">
    <div class="fab-mini">
      <span class="fab-mini-label">Text Note</span>
      <button class="fab-mini-btn fab-text-btn" id="newTextBtn">📝</button>
    </div>
    <div class="fab-mini">
      <span class="fab-mini-label">Drawing</span>
      <button class="fab-mini-btn fab-draw-btn" id="newDrawBtn">🎨</button>
    </div>
    <div class="fab-mini">
      <span class="fab-mini-label">Checklist</span>
      <button class="fab-mini-btn fab-check-btn" id="newCheckBtn">✅</button>
    </div>
  </div>
  <button class="fab" id="fab">+</button>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu">
  <button class="ctx-item" id="ctxRename">✏️ Rename</button>
  <button class="ctx-item danger" id="ctxDelete">🗑️ Delete</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New Folder</div>
    <input class="modal-input" id="modalInput" placeholder="Folder name">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalConfirm">Create</button>
    </div>
  </div>
</div>

<!-- Snackbar -->
<div class="snackbar" id="snackbar"></div>

<script>
// ===== STATE =====
let state = JSON.parse(localStorage.getItem('notesApp') || 'null') || {
  folders: ['All', 'Personal', 'Work'],
  notes: [],
  nextId: 1
};

let currentFolder = 'All';
let currentNote = null;
let fabOpen = false;
let searchMode = false;
let ctxTarget = null;

// Colors for note accents
const COLORS = ['#1a73e8','#ea4335','#34a853','#fbbc04','#9c27b0','#ff7043'];

function save() {
  localStorage.setItem('notesApp', JSON.stringify(state));
}

function snack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== RENDER FOLDERS =====
function renderFolders() {
  const bar = document.getElementById('folderBar');
  bar.innerHTML = '';
  const allFolders = ['All', ...state.folders.filter(f => f !== 'All')];
  allFolders.forEach(f => {
    const count = f === 'All' ? state.notes.length : state.notes.filter(n => n.folder === f).length;
    const chip = document.createElement('button');
    chip.className = 'folder-chip' + (f === currentFolder ? ' active' : '');
    chip.innerHTML = `${f} <span class="count">${count}</span>`;
    chip.onclick = () => { currentFolder = f; renderFolders(); renderNotes(); };
    bar.appendChild(chip);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'folder-chip-add';
  addBtn.innerHTML = '+';
  addBtn.onclick = openAddFolder;
  bar.appendChild(addBtn);

  // Update folder select in editor
  const sel = document.getElementById('editorFolder');
  sel.innerHTML = state.folders.filter(f => f !== 'All').map(f => `<option value="${f}">${f}</option>`).join('');
}

// ===== RENDER NOTES =====
function renderNotes() {
  const list = document.getElementById('notesList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  let notes = state.notes.filter(n => {
    const inFolder = currentFolder === 'All' || n.folder === currentFolder;
    if (!inFolder) return false;
    if (search) {
      return n.title.toLowerCase().includes(search) || (n.preview || '').toLowerCase().includes(search);
    }
    return true;
  }).sort((a,b) => b.updated - a.updated);

  if (!notes.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📒</div>
      <div class="empty-title">${search ? 'No results' : 'No notes yet'}</div>
      <div class="empty-sub">${search ? 'Try a different search.' : 'Tap + to create your first note.'}</div>
    </div>`;
    return;
  }

  list.innerHTML = '';
  notes.forEach(note => {
    const card = document.createElement('div');
    card.className = 'note-card';
    card.dataset.id = note.id;

    const color = COLORS[note.id % COLORS.length];
    const typeLabel = note.type === 'text' ? 'Text' : note.type === 'draw' ? 'Drawing' : 'Checklist';
    const badgeClass = note.type === 'text' ? 'badge-text' : note.type === 'draw' ? 'badge-draw' : 'badge-check';
    const date = new Date(note.updated).toLocaleDateString('en-US', {month:'short', day:'numeric'});

    card.innerHTML = `
      <div class="note-card-accent" style="background:${color}"></div>
      <div class="note-title">${note.title || 'Untitled'}</div>
      <div class="note-preview">${note.preview || '...'}</div>
      <div class="note-meta">
        <span class="note-date">${date}</span>
        <span class="note-type-badge ${badgeClass}">${typeLabel}</span>
      </div>`;

    card.onclick = () => openNote(note);
    card.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, note); });
    card.addEventListener('pointerdown', e => {
      const timer = setTimeout(() => showCtx(e, note), 500);
      card.addEventListener('pointerup', () => clearTimeout(timer), {once:true});
      card.addEventListener('pointermove', () => clearTimeout(timer), {once:true});
    });

    list.appendChild(card);
  });
}

// ===== CONTEXT MENU =====
function showCtx(e, note) {
  ctxTarget = note;
  const menu = document.getElementById('ctxMenu');
  menu.classList.add('open');
  const x = Math.min(e.clientX || (window.innerWidth - 180), window.innerWidth - 180);
  const y = Math.min(e.clientY || 200, window.innerHeight - 120);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

document.addEventListener('click', () => document.getElementById('ctxMenu').classList.remove('open'));
document.getElementById('ctxDelete').onclick = () => {
  if (!ctxTarget) return;
  state.notes = state.notes.filter(n => n.id !== ctxTarget.id);
  save(); renderFolders(); renderNotes();
  snack('Note deleted');
};
document.getElementById('ctxRename').onclick = () => {
  if (!ctxTarget) return;
  openModal('Rename Note', ctxTarget.title, name => {
    ctxTarget.title = name;
    ctxTarget.updated = Date.now();
    save(); renderNotes();
    snack('Renamed');
  });
};

// ===== OPEN/CLOSE NOTE =====
function openNote(note) {
  currentNote = note ? JSON.parse(JSON.stringify(note)) : null;
  const screen = document.getElementById('editorScreen');
  document.getElementById('editorTitle').value = note ? note.title : '';
  const sel = document.getElementById('editorFolder');
  if (note && note.folder) sel.value = note.folder;

  buildEditor(note ? note.type : 'text', note);
  screen.classList.add('visible');
  document.getElementById('fabContainer').style.display = 'none';
}

function closeEditor() {
  document.getElementById('editorScreen').classList.remove('visible');
  document.getElementById('fabContainer').style.display = 'flex';
  currentNote = null;
  fabOpen = false;
  document.getElementById('fab').className = 'fab';
  document.getElementById('fabMenu').classList.remove('open');
}

document.getElementById('editorBack').onclick = () => {
  const title = document.getElementById('editorTitle').value.trim();
  const body = document.getElementById('editorBody');
  const hasContent = title || body.querySelector('[contenteditable]')?.innerText.trim() || 
    body.querySelector('#checkList')?.querySelectorAll('.check-input').length ||
    body.querySelector('#drawCanvas');
  if (hasContent) {
    saveNote();
  } else {
    closeEditor();
  }
};

// ===== BUILD EDITOR =====
function buildEditor(type, note) {
  const body = document.getElementById('editorBody');
  body.innerHTML = '';

  if (type === 'text') {
    const toolbar = document.createElement('div');
    toolbar.className = 'editor-toolbar';
    toolbar.innerHTML = `
      <button class="tb-btn" data-cmd="bold" title="Bold"><b>B</b></button>
      <button class="tb-btn" data-cmd="italic" title="Italic"><i>I</i></button>
      <button class="tb-btn" data-cmd="underline" title="Underline"><u>U</u></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet list">• ≡</button>
      <button class="tb-btn" data-cmd="insertOrderedList" title="Numbered list">1≡</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" data-cmd="justifyLeft" title="Align left">⬅</button>
      <button class="tb-btn" data-cmd="justifyCenter" title="Center">≡</button>
      <button class="tb-btn" data-cmd="justifyRight" title="Align right">➡</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" data-cmd="undo" title="Undo">↩</button>
      <button class="tb-btn" data-cmd="redo" title="Redo">↪</button>`;

    toolbar.querySelectorAll('[data-cmd]').forEach(btn => {
      btn.onclick = () => { document.execCommand(btn.dataset.cmd, false, null); editor.focus(); };
    });
    body.appendChild(toolbar);

    const editor = document.createElement('div');
    editor.className = 'text-editor';
    editor.contentEditable = 'true';
    editor.spellcheck = true;
    editor.innerHTML = note ? note.content : '';
    editor.dataset.type = 'text';
    body.appendChild(editor);

  } else if (type === 'check') {
    const list = document.createElement('div');
    list.className = 'checklist-editor';
    list.id = 'checkList';

    if (note && note.items) {
      note.items.forEach((item, i) => addCheckItem(list, item.text, item.done));
    } else {
      addCheckItem(list, '', false);
    }

    const addBtn = document.createElement('button');
    addBtn.className = 'add-item-btn';
    addBtn.innerHTML = '+ Add item';
    addBtn.onclick = () => { addCheckItem(list, '', false); };
    list.appendChild(addBtn);
    list.dataset.type = 'check';
    body.appendChild(list);

  } else if (type === 'draw') {
    const draw = document.createElement('div');
    draw.className = 'draw-editor';

    const dtb = document.createElement('div');
    dtb.className = 'draw-toolbar';

    const colors = ['#1a1a1a','#ea4335','#1a73e8','#34a853','#fbbc04','#9c27b0','#ff7043','#ffffff'];
    let currentColor = '#1a1a1a';
    let currentSize = 4;
    let isEraser = false;

    colors.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'color-dot' + (c === currentColor ? ' selected' : '');
      dot.style.background = c === '#ffffff' ? '#fff' : c;
      if (c === '#ffffff') dot.style.border = '2px solid #ccc';
      dot.onclick = () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
        currentColor = c;
        isEraser = false;
        eraserBtn.classList.remove('active');
      };
      dtb.appendChild(dot);
    });

    const sep = document.createElement('div');
    sep.style.cssText = 'width:1px;background:var(--border);margin:0 4px;align-self:stretch;flex-shrink:0';
    dtb.appendChild(sep);

    const eraserBtn = document.createElement('button');
    eraserBtn.className = 'draw-tool-btn';
    eraserBtn.textContent = '⬜ Eraser';
    eraserBtn.onclick = () => {
      isEraser = !isEraser;
      eraserBtn.classList.toggle('active', isEraser);
    };
    dtb.appendChild(eraserBtn);

    const clearBtn = document.createElement('button');
    clearBtn.className = 'draw-tool-btn';
    clearBtn.textContent = '🗑 Clear';
    clearBtn.onclick = () => { ctx.clearRect(0,0,canvas.width,canvas.height); };
    dtb.appendChild(clearBtn);

    const sizeSlider = document.createElement('input');
    sizeSlider.type = 'range'; sizeSlider.min = 1; sizeSlider.max = 30; sizeSlider.value = 4;
    sizeSlider.className = 'size-slider';
    sizeSlider.oninput = () => { currentSize = +sizeSlider.value; };
    dtb.appendChild(sizeSlider);

    draw.appendChild(dtb);

    const canvas = document.createElement('canvas');
    canvas.id = 'drawCanvas';
    draw.appendChild(canvas);
    body.appendChild(draw);

    // Init canvas
    setTimeout(() => {
      canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;
      const ctx = canvas.getContext('2d');
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      canvas._ctx = ctx;

      // Load existing drawing
      if (note && note.content) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, canvas.offsetWidth, canvas.offsetHeight);
        img.src = note.content;
      }

      let drawing = false, lastX, lastY;

      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return {
          x: (touch.clientX - rect.left),
          y: (touch.clientY - rect.top)
        };
      }

      function startDraw(e) {
        drawing = true;
        const p = getPos(e);
        lastX = p.x; lastY = p.y;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        e.preventDefault();
      }

      function doDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = getPos(e);
        ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
        ctx.strokeStyle = isEraser ? 'rgba(0,0,0,1)' : currentColor;
        ctx.lineWidth = isEraser ? currentSize * 3 : currentSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        lastX = p.x; lastY = p.y;
      }

      function stopDraw() { drawing = false; }

      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', doDraw);
      canvas.addEventListener('mouseup', stopDraw);
      canvas.addEventListener('touchstart', startDraw, {passive:false});
      canvas.addEventListener('touchmove', doDraw, {passive:false});
      canvas.addEventListener('touchend', stopDraw);

      canvas._getDataURL = () => canvas.toDataURL();
    }, 50);

    draw.dataset.type = 'draw';
    body.appendChild = (() => {
      const orig = body.appendChild.bind(body);
      return (el) => { orig(el); };
    })();
  }
}

function addCheckItem(list, text, done) {
  const item = document.createElement('div');
  item.className = 'check-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'check-cb'; cb.checked = done;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'check-input' + (done ? ' done' : '');
  inp.value = text; inp.placeholder = 'List item…';
  cb.onchange = () => { inp.classList.toggle('done', cb.checked); };
  inp.onkeydown = e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const addBtn = list.querySelector('.add-item-btn');
      addCheckItem(list, '', false);
      // focus last input before add btn
      const inputs = list.querySelectorAll('.check-input');
      inputs[inputs.length - 1].focus();
    }
  };
  const del = document.createElement('button');
  del.className = 'check-del'; del.innerHTML = '✕';
  del.onclick = () => item.remove();
  item.append(cb, inp, del);
  const addBtn = list.querySelector('.add-item-btn');
  if (addBtn) list.insertBefore(item, addBtn);
  else list.appendChild(item);
}

// ===== SAVE NOTE =====
document.getElementById('editorSave').onclick = saveNote;

function saveNote() {
  const title = document.getElementById('editorTitle').value.trim() || 'Untitled';
  const folder = document.getElementById('editorFolder').value || state.folders.find(f=>f!=='All') || 'Personal';
  const body = document.getElementById('editorBody');

  let type, content, preview, items;

  const textEditor = body.querySelector('[contenteditable]');
  const checkList = body.querySelector('#checkList');
  const drawEditor = body.querySelector('#drawCanvas');

  if (textEditor) {
    type = 'text';
    content = textEditor.innerHTML;
    preview = textEditor.innerText.slice(0, 120);
  } else if (checkList) {
    type = 'check';
    items = [...checkList.querySelectorAll('.check-item')].map(item => ({
      text: item.querySelector('.check-input').value,
      done: item.querySelector('.check-cb').checked
    }));
    preview = items.map(i => (i.done ? '✓ ' : '○ ') + i.text).join(' · ').slice(0,120);
    content = '';
  } else if (drawEditor) {
    type = 'draw';
    content = drawEditor._getDataURL ? drawEditor._getDataURL() : '';
    preview = '🎨 Drawing';
  }

  if (currentNote) {
    const existing = state.notes.find(n => n.id === currentNote.id);
    if (existing) {
      existing.title = title;
      existing.folder = folder;
      existing.content = content;
      existing.preview = preview;
      if (items) existing.items = items;
      existing.updated = Date.now();
    }
  } else {
    state.notes.push({
      id: state.nextId++,
      title, folder, type, content, preview,
      items: items || [],
      created: Date.now(),
      updated: Date.now()
    });
  }

  save(); renderFolders(); renderNotes();
  closeEditor();
  snack('Note saved ✓');
}

// ===== FAB =====
document.getElementById('fab').onclick = (e) => {
  e.stopPropagation();
  fabOpen = !fabOpen;
  document.getElementById('fab').className = 'fab' + (fabOpen ? ' open' : '');
  document.getElementById('fabMenu').classList.toggle('open', fabOpen);
};

document.addEventListener('click', () => {
  if (fabOpen) {
    fabOpen = false;
    document.getElementById('fab').className = 'fab';
    document.getElementById('fabMenu').classList.remove('open');
  }
});

document.getElementById('newTextBtn').onclick = (e) => { e.stopPropagation(); openNewNote('text'); };
document.getElementById('newDrawBtn').onclick = (e) => { e.stopPropagation(); openNewNote('draw'); };
document.getElementById('newCheckBtn').onclick = (e) => { e.stopPropagation(); openNewNote('check'); };

function openNewNote(type) {
  fabOpen = false;
  document.getElementById('fab').className = 'fab';
  document.getElementById('fabMenu').classList.remove('open');
  currentNote = null;
  document.getElementById('editorTitle').value = '';
  const sel = document.getElementById('editorFolder');
  sel.value = currentFolder !== 'All' ? currentFolder : (state.folders.find(f=>f!=='All') || 'Personal');
  buildEditor(type, null);
  document.getElementById('editorScreen').classList.add('visible');
  document.getElementById('fabContainer').style.display = 'none';
}

// ===== SEARCH =====
document.getElementById('searchToggle').onclick = () => {
  document.getElementById('searchBar').style.display = 'flex';
  document.getElementById('searchToggle').parentElement.style.display = 'none';
  document.getElementById('searchInput').focus();
};
document.getElementById('searchClose').onclick = () => {
  document.getElementById('searchBar').style.display = 'none';
  document.getElementById('searchToggle').parentElement.style.display = '';
  document.getElementById('searchInput').value = '';
  renderNotes();
};
document.getElementById('searchInput').oninput = renderNotes;

// Fix: the topbar containing search toggle
document.getElementById('searchToggle').closest('.topbar').id = 'mainTopbar';

// ===== FOLDER MANAGEMENT =====
document.getElementById('folderMgrBtn').onclick = openAddFolder;

function openAddFolder() {
  openModal('New Folder', '', name => {
    if (name && !state.folders.includes(name)) {
      state.folders.push(name);
      save(); renderFolders();
      snack('Folder created');
    }
  });
}

// ===== MODAL =====
let modalCallback = null;
function openModal(title, val, cb) {
  modalCallback = cb;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalInput').value = val || '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalInput').focus(), 300);
}
document.getElementById('modalCancel').onclick = () => document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalConfirm').onclick = () => {
  const val = document.getElementById('modalInput').value.trim();
  if (val && modalCallback) modalCallback(val);
  document.getElementById('modalOverlay').classList.remove('open');
};
document.getElementById('modalInput').onkeydown = e => {
  if (e.key === 'Enter') document.getElementById('modalConfirm').click();
};
document.getElementById('modalOverlay').onclick = e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
};

// ===== EDITOR MORE MENU =====
document.getElementById('editorMore').onclick = (e) => {
  e.stopPropagation();
  if (currentNote) {
    ctxTarget = currentNote;
    showCtx(e, currentNote);
  }
};

// ===== INIT =====
renderFolders();
renderNotes();
</script>
</body>
</html>
